services:
  postgres:
    image: postgres:16
    container_name: kinframe-postgres
    environment:
      POSTGRES_DB: kinframe
      POSTGRES_USER: kinframe
      POSTGRES_PASSWORD: change-me
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kinframe-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - ./data/redis:/data

  minio:
    image: minio/minio:latest
    container_name: kinframe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kinframe
      MINIO_ROOT_PASSWORD: change-me
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - ./data/minio:/data

  caddy:
    image: caddy:latest
    container_name: kinframe-caddy
    ports:
      - "${CADDY_HTTP_PORT:-18080}:80"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
    depends_on:
      - minio
